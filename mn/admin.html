<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Manager | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <div id="loadingScreen" class="fixed inset-0 bg-white z-50 flex items-center justify-center transition-opacity duration-300">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-600"></div>
    </div>

    <div id="loginView" class="hidden min-h-screen flex items-center justify-center px-4 bg-gradient-to-br from-indigo-50 to-gray-100">
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl max-w-md w-full border border-gray-100">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 mb-2">Welcome Back</h1>
                <p class="text-gray-500 text-sm">Log in to manage your portfolio blog posts.</p>
            </div>
            
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="loginEmail" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition" placeholder="admin@example.com">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-700 mb-2">Password</label>
                    <input type="password" id="loginPassword" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition" placeholder="••••••••">
                </div>
                <p id="loginError" class="text-red-500 text-xs hidden"></p>
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-600/20">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <div id="dashboardView" class="hidden min-h-screen flex flex-col md:flex-row">
        
        <aside class="w-full md:w-64 bg-gray-950 text-white p-6 flex flex-col justify-between">
            <div>
                <div class="flex items-center space-x-3 mb-10 px-2">
                    <div class="h-8 w-8 bg-indigo-500 rounded-lg flex items-center justify-center font-bold text-white">B</div>
                    <span class="text-lg font-bold tracking-tight">Blog Manager</span>
                </div>
                <nav class="space-y-2">
                    <a href="#" class="flex items-center space-x-3 px-4 py-3 bg-indigo-600 text-white rounded-xl font-medium transition">
                        <ion-icon name="grid-outline"></ion-icon>
                        <span>Dashboard</span>
                    </a>
                </nav>
            </div>
            <button id="logoutBtn" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-900 rounded-xl font-medium transition mt-10">
                <ion-icon name="log-out-outline"></ion-icon>
                <span>Logout</span>
            </button>
        </aside>

        <main class="flex-1 p-6 md:p-10 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold tracking-tight">Your Published Blogs</h2>
                        <p class="text-gray-500 text-sm">Manage, review, and delete your posts live.</p>
                    </div>
                </div>
                
                <div id="blogListContainer" class="space-y-4">
                    </div>
            </div>

            <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm h-fit sticky top-6">
                <h3 class="text-lg font-bold mb-4">Create New Post</h3>
                <form id="createPostForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Post Title</label>
                        <input type="text" id="postTitle" required class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-indigo-500" placeholder="e.g., Designing with Tailwind">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Cover Image URL</label>
                        <input type="url" id="postImageUrl" required class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-indigo-500" placeholder="https://images.unsplash.com/...">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Content Body</label>
                        <textarea id="postContent" rows="6" required class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 focus:outline-none focus:border-indigo-500 resize-none" placeholder="Write your post details here..."></textarea>
                    </div>
                    <button type="submit" class="w-full py-3 bg-indigo-600 text-white text-sm font-bold rounded-xl hover:bg-indigo-700 transition">
                        Publish Post
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        // Import the Firebase SDK modules via official CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAd-hO7b3O7earWSAilzzZuLaivnFYrC_w",
            authDomain: "porto-54f19.firebaseapp.com",
            projectId: "porto-54f19",
            storageBucket: "porto-54f19.firebasestorage.app",
            messagingSenderId: "25219068431",
            appId: "1:25219068431:web:5cce59235013b8571f297a"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // View elements
        const loadingScreen = document.getElementById('loadingScreen');
        const loginView = document.getElementById('loginView');
        const dashboardView = document.getElementById('dashboardView');

        // Monitor user authentication state
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User logged in, transition to Dashboard view
                loginView.classList.add('hidden');
                dashboardView.classList.remove('hidden');
                fetchPosts(); // GET request to render blog feed
            } else {
                // User not logged in, transition to Login view
                dashboardView.classList.add('hidden');
                loginView.classList.remove('hidden');
            }
            loadingScreen.classList.add('opacity-0');
            setTimeout(() => loadingScreen.classList.add('hidden'), 300);
        });

        // Handle Login Submission (POST Request equivalence for authentication token)
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorElement = document.getElementById('loginError');
            
            try {
                errorElement.classList.add('hidden');
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                errorElement.innerText = "Invalid credentials. Please try again.";
                errorElement.classList.remove('hidden');
            }
        });

        // Handle Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth);
        });

        // Handle New Blog Post Creation (POST Method equivalent)
        document.getElementById('createPostForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('postTitle').value;
            const imageUrl = document.getElementById('postImageUrl').value;
            const content = document.getElementById('postContent').value;

            try {
                // Send payload data directly to Firestore database
                await addDoc(collection(db, "posts"), {
                    title: title,
                    imageUrl: imageUrl,
                    content: content,
                    createdAt: Date.now()
                });
                
                document.getElementById('createPostForm').reset();
                fetchPosts(); // Refresh data view instantly
            } catch (error) {
                alert("Error publishing post: " + error.message);
            }
        });

        // Fetch and Render Articles (GET Method equivalent)
        async function fetchPosts() {
            const listContainer = document.getElementById('blogListContainer');
            listContainer.innerHTML = ''; // Clear previous elements
            
            try {
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    listContainer.innerHTML = `
                        <div class="p-8 text-center bg-white rounded-xl border border-dashed border-gray-300 text-gray-400 text-sm">
                            No articles found. Write your first post on the right panel!
                        </div>`;
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    const postId = docSnap.id;

                    const postElement = document.createElement('div');
                    postElement.className = "bg-white p-4 rounded-xl border border-gray-200 flex items-center justify-between gap-4 shadow-sm";
                    postElement.innerHTML = `
                        <div class="flex items-center space-x-4 overflow-hidden">
                            <img src="${post.imageUrl}" class="w-16 h-16 object-cover rounded-lg flex-shrink-0 bg-gray-100" alt="Cover"/>
                            <div class="truncate">
                                <h4 class="font-bold text-gray-900 truncate">${post.title}</h4>
                                <p class="text-gray-500 text-xs truncate max-w-md">${post.content}</p>
                            </div>
                        </div>
                        <button data-id="${postId}" class="delete-btn text-gray-400 hover:text-red-500 p-2 text-xl transition flex-shrink-0">
                            <ion-icon name="trash-outline"></ion-icon>
                        </button>
                    `;
                    listContainer.appendChild(postElement);
                });

                // Attach delete event listeners to the generated buttons
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const targetId = e.currentTarget.getAttribute('data-id');
                        if (confirm("Are you sure you want to delete this article?")) {
                            await deleteDoc(doc(db, "posts", targetId));
                            fetchPosts(); // Re-sync ui state
                        }
                    });
                });

            } catch (error) {
                console.error("Error retrieving documents: ", error);
            }
        }
    </script>
</body>
</html>
